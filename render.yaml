services:
  - type: web
    name: ap-election-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/summary
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.5
